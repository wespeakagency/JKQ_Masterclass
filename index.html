      const usePrefersReducedMotion = () => {
        const [reduced, setReduced] = useState(false);
        useEffect(() => {
          const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
          const update = () => setReduced(!!mq.matches);
          update();
          mq.addEventListener?.("change", update);
          return () => mq.removeEventListener?.("change", update);
        }, []);
        return reduced;
      };

      const isFinePointer = () =>
        window.matchMedia &&
        window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      const Marker = ({ type, color = "#FFD700", className = "", delay = 0.5, duration = 2.2 }) => {
        const draw = {
          hidden: { pathLength: 0, opacity: 0 },
          visible: {
            pathLength: 1,
            opacity: 1,
            transition: {
              pathLength: {
                type: "spring",
                duration,
                bounce: 0,
                delay,
                stiffness: 20,
                damping: 10
              },
              opacity: { duration: 0.2, delay }
            }
          }
        };

        const filterId = React.useId();

        const svgProps = {
          className: `absolute pointer-events-none ${className}`,
          initial: "hidden",
          whileInView: "visible",
          viewport: { once: true, margin: "-10%" },
          style: { overflow: "visible", mixBlendMode: "normal" }
        };

        const commonStrokeProps = {
          stroke: color,
          strokeLinecap: "round",
          strokeLinejoin: "round",
          fill: "transparent",
          filter: `url(#${filterId})`,
          variants: draw
        };

        const InkFilter = () => (

            <filter id={filterId} x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />

            </filter>
          </defs>
        );

        switch (type) {
          case "underline":
            return (

                <InkFilter />
                <motion.path d="M10,25 Q150,35 290,20" strokeWidth="6" strokeOpacity="0.8" {...commonStrokeProps} />
              </motion.svg>
            );
          case "highlight":
            return (
              <motion.svg
                width="100%"
                height="100%"
                viewBox="0 0 300 60"
                preserveAspectRatio="none"
                {...svgProps}
                style={{ ...svgProps.style, mixBlendMode: "multiply", zIndex: -1 }}
              >
                <InkFilter />
                <motion.path
                  d="M5,30 Q150,35 295,25"
                  strokeWidth="35"
                  strokeOpacity="0.35"
                  {...commonStrokeProps}
                  stroke={color}
                />
              </motion.svg>
            );
          case "circle":
            return (
              <motion.svg
                width="120%"
                height="140%"
                viewBox="0 0 200 120"
                preserveAspectRatio="none"
                {...svgProps}
                style={{ top: "-20%", left: "-10%" }}

                  d="M30,60 C30,10 170,10 180,60 C185,110 40,110 30,60 C28,50 35,40 40,45"
                  strokeWidth="4"

                />
              </motion.svg>
            );
          case "box":

                width="110%"
                height="120%"
                viewBox="0 0 200 100"
                preserveAspectRatio="none"
                {...svgProps}
                style={{ top: "-10%", left: "-5%" }}
              >
                <InkFilter />
                <motion.path d="M10,10 L190,15 L185,90 L15,85 Z" strokeWidth="3" {...commonStrokeProps} />
              </motion.svg>
            );
          case "arrow":
            return (

                <InkFilter />
                <motion.path
                  d="M10 20 Q 50 10, 80 80 M 80 80 L 55 65 M 80 80 L 90 50"

                />

            );
          case "scribble":

                <InkFilter />

                  d="M10,50 Q40,10 70,50 T130,50 T190,50 T250,50 T290,50"

      // Custom Cursor (desktop only, reduced-motion aware, rAF throttled)
      const CustomCursor = () => {
        const reducedMotion = usePrefersReducedMotion();
        const enabled = !reducedMotion && isFinePointer();

        const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
        const [isHovering, setIsHovering] = useState(false);
        const rafRef = useRef(null);

        useEffect(() => {
          document.body.dataset.customCursor = enabled ? "on" : "off";
          if (!enabled) return;

          const onMove = (e) => {
            if (rafRef.current) return;
            rafRef.current = requestAnimationFrame(() => {
              setMousePosition({ x: e.clientX, y: e.clientY });
              rafRef.current = null;
            });
          };

          const onOver = (e) => {
            const hit = e.target.closest?.("button, a, [data-hover], .hover-trigger");
            setIsHovering(!!hit);
          };

          window.addEventListener("mousemove", onMove, { passive: true });
          window.addEventListener("mouseover", onOver, { passive: true });

          return () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseover", onOver);
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
          };
        }, [enabled]);

        if (!enabled) return null;

        return (
          <>
            <motion.div
              className="fixed top-0 left-0 w-3 h-3 bg-accent rounded-full pointer-events-none z-[10000]"
              animate={{
                x: mousePosition.x - 6,
                y: mousePosition.y - 6,
                scale: isHovering ? 0 : 1
              }}
              transition={{ duration: 0.08 }}
              aria-hidden="true"
            />
            <motion.div
              className="fixed top-0 left-0 w-12 h-12 border-2 border-accent rounded-full pointer-events-none z-[9999]"
              animate={{
                x: mousePosition.x - 24,
                y: mousePosition.y - 24,
                scale: isHovering ? 1.4 : 1,
                backgroundColor: isHovering ? "rgba(255, 215, 0, 0.08)" : "transparent",
                borderColor: isHovering ? "#FFD700" : "rgba(255, 215, 0, 0.45)"
              }}
              transition={{ type: "spring", stiffness: 320, damping: 22 }}
              aria-hidden="true"
            />
          </>
        );
      };

                <div className="absolute top-0 left-0 w-full h-full bg-white/5 transform rotate-1 rounded-sm border border-white/10" aria-hidden="true"></div>

                <div className="relative bg-accent text-black p-8 md:p-16 shadow-[0_0_50px_rgba(255,215,0,0.2)]">
                  <div className="absolute inset-0 grid-bg opacity-10 pointer-events-none mix-blend-multiply" aria-hidden="true"></div>

                  <motion.div
                    initial={{ opacity: 0, scale: 2, rotate: 20 }}
                    whileInView={{ opacity: 0.8, scale: 1, rotate: -12 }}
                    viewport={{ margin: "-100px" }}
                    transition={{ type: "spring", bounce: 0.3, duration: 1 }}
                    className="absolute top-6 right-6 border-[3px] border-black p-2 px-4 rounded hidden md:block mix-blend-multiply pointer-events-none z-0"
                    aria-hidden="true"
                  >
                    <span className="font-marker text-xl md:text-2xl font-bold uppercase tracking-widest">APROBADO</span>
                    <div className="text-[10px] font-sans text-center mt-0 font-bold leading-none">JONATHAN KUBBEN</div>
                  </motion.div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-16 relative z-10">
                    <div className="space-y-8">
                      <div className="inline-block bg-black text-white font-bold px-4 py-2 text-xs uppercase tracking-wider">
                        Oferta Limitada — Acceso Total
                      </div>

                      <div>
                        <h2 className="text-5xl md:text-6xl font-black uppercase tracking-tight leading-none mb-2">Tu Historia</h2>
                        <h2 className="text-5xl md:text-6xl font-black uppercase tracking-tight leading-none text-white/90">Comienza Hoy</h2>
                      </div>

                      <p className="font-medium text-lg leading-relaxed max-w-sm border-l-2 border-black pl-4">
                        No es solo un curso. Es el mapa exacto que usé para construir mi carrera.
                      </p>

                      <div className="bg-white/20 backdrop-blur-sm p-4 rounded border border-black/10 w-fit">
                        <div className="flex items-center gap-3">
                          <div className="w-2 h-2 rounded-full bg-red-600 animate-pulse" aria-hidden="true"></div>
                          <span className="text-sm font-bold uppercase tracking-widest">Oferta por tiempo limitado</span>
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col justify-between md:pt-20">
                      <div className="relative pl-4">
                        <div className="relative inline-block mb-2">
                          <span className="text-black/50 text-2xl font-bold font-mono line-through">$1,599 MXN</span>
                        </div>

                        <div className="flex items-baseline gap-2 relative mt-2">
                          <motion.span
                            initial={{ scale: 1 }}
                            whileInView={{ scale: [1, 1.15, 1] }}
                            transition={{ duration: 0.6, ease: "backOut", delay: 0.2 }}
                            className="text-8xl font-black relative z-10 tracking-tighter inline-block origin-bottom-left"
                          >
                            $799
                          </motion.span>
                          <span className="text-2xl font-bold">MXN</span>
                        </div>
                      </div>

                      <ul className="space-y-4 my-10">
                        {["14h de Contenido 4K", "Certificado Oficial", "Acceso de por vida", "Comunidad Privada"].map((item, i) => (
                          <li key={i} className="flex items-center gap-4 font-bold text-lg">
                            <div className="w-6 h-6 border-2 border-black flex items-center justify-center text-xs bg-black text-accent" aria-hidden="true">
                              <Check size={16} strokeWidth={4} aria-hidden="true" />
                            </div>
                            {item}
                          </li>
                        ))}
                      </ul>

                      <button
                        className="w-full bg-black text-white py-6 font-black text-xl uppercase hover:bg-zinc-800 transition-colors flex justify-center items-center gap-4 group relative overflow-hidden shadow-2xl"
                        aria-label="Inscribirme"
                        type="button"
                      >
                        <span className="relative z-10">Firmar e Inscribirme</span>
                        <span className="relative z-10 group-hover:translate-x-2 transition-transform" aria-hidden="true">
                          →
                        </span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div className="mt-12 flex items-center gap-3 opacity-60">
                <div className="h-px w-12 bg-white" aria-hidden="true"></div>
                <p className="text-white text-xs font-mono uppercase tracking-widest">Garantía de Satisfacción 30 Días</p>
                <div className="h-px w-12 bg-white" aria-hidden="true"></div>
              </div>
            </div>
          </section>
        );
      };

      const FAQ = () => {
        const [activeIndex, setActiveIndex] = useState(null);

        return (
          <section className="py-32 bg-dark">
            <div className="container mx-auto px-6 md:px-24">
              <div className="grid grid-cols-1 md:grid-cols-12 gap-12">
                <div className="md:col-span-4">
                  <h2 className="text-4xl font-black text-white uppercase tracking-tighter mb-4">FAQ</h2>
                  <div className="w-12 h-1 bg-accent" aria-hidden="true"></div>
                </div>

                <div className="md:col-span-8">
                  <div className="border-t border-white/10">
                    {FAQS.map((faq, index) => (
                      <div key={index} className="border-b border-white/10">
                        <button
                          onClick={() => setActiveIndex(activeIndex === index ? null : index)}
                          className="w-full py-8 flex justify-between items-center text-left group hover-trigger"
                          aria-expanded={activeIndex === index}
                        >
                          <span
                            className={`text-lg md:text-xl font-bold transition-colors duration-300 ${
                              activeIndex === index ? "text-accent" : "text-white group-hover:text-gray-300"
                            }`}
                          >
                            {faq.question}
                          </span>
                          <span className={`transition-colors ${activeIndex === index ? "text-accent" : "text-white"}`} aria-hidden="true">
                            {activeIndex === index ? <Minus size={20} /> : <Plus size={20} />}
                          </span>
                        </button>

                        <AnimatePresence>
                          {activeIndex === index && (
                            <motion.div
                              initial={{ height: 0, opacity: 0 }}
                              animate={{ height: "auto", opacity: 1 }}
                              exit={{ height: 0, opacity: 0 }}
                              transition={{ duration: 0.3 }}
                              className="overflow-hidden"
                            >
                              <div className="pb-8">
                                <p className="text-gray-400 leading-relaxed max-w-2xl">{faq.answer}</p>
                              </div>
                            </motion.div>
                          )}
                        </AnimatePresence>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      };

      const App = () => {
        const [activeSection, setActiveSection] = useState("intro");

        const sections = useMemo(
          () => [
            { id: "intro", label: "01 Intro" },
            { id: "reality", label: "02 Realidad" },
            { id: "curriculum", label: "03 Programa" },
            { id: "offer", label: "04 Oferta" }
          ],
          []
        );

        const scrollTo = (id) => {
          const element = document.getElementById(id);
          if (element) element.scrollIntoView({ behavior: "smooth" });
        };

        useEffect(() => {
          const handleScroll = () => {
            const scrollPosition = window.scrollY + window.innerHeight / 3;
            for (const section of sections) {
              const element = document.getElementById(section.id);
              if (element) {
                const { offsetTop, offsetHeight } = element;
                if (scrollPosition >= offsetTop && scrollPosition < offsetTop + offsetHeight) {
                  setActiveSection(section.id);
                }
              }
            }
          };

          window.addEventListener("scroll", handleScroll, { passive: true });
          handleScroll();
          return () => window.removeEventListener("scroll", handleScroll);
        }, [sections]);

        return (
          <div className="bg-[#0a0a0a] min-h-screen text-white selection:bg-accent selection:text-black">
            <CustomCursor />
            <ChapterNavigation activeSection={activeSection} sections={sections} scrollTo={scrollTo} />

            <main id="main">
              <Hero />
              <ProblemSolution />
              <Stats />
              <Curriculum />
              <Testimonials />
              <Pricing />
              <FAQ />
            </main>

            <footer className="py-20 bg-black border-t border-white/10 text-center relative overflow-hidden">
              <h2 className="text-[12vw] font-black text-[#151515] leading-none select-none absolute bottom-0 left-1/2 -translate-x-1/2" aria-hidden="true">
                KUBBEN
              </h2>
              <div className="relative z-10 container mx-auto px-6">
                <p className="text-gray-500 font-bold mb-8 uppercase tracking-widest">© 2026 Masterclass</p>
                <div className="flex justify-center gap-8 font-bold text-sm">
                  <a href="#" className="hover:text-accent transition-colors hover-trigger">
                    INSTAGRAM
                  </a>
                  <a href="#" className="hover:text-accent transition-colors hover-trigger">
                    TIKTOK
                  </a>
                  <a href="#" className="hover:text-accent transition-colors hover-trigger">
                    YOUTUBE
                  </a>
                </div>
              </div>
            </footer>
          </div>
        );
      };

      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
